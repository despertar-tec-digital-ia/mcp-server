services:
  ghl-mcp:
    build: .
    container_name: ghl-mcp-calendario
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      LOG_FILE: /app/logs/app.log
    volumes:
      - logs_data:/app/logs
      - data:/app/data

volumes:
  logs_data:
  data: